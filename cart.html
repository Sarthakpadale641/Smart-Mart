<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - smart mart</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="home.html">smart mart</a>

    <div class="ms-auto">
      <a href="home.html" class="nav-link d-inline">Home</a>
      <a href="about.html" class="nav-link d-inline">About</a>
      
      <a href="cart.html" class="nav-link d-inline">Cart</a>
      <a href="#" onclick="return logoutUser()" class="nav-link d-inline">Logout</a>
    </div>
  </div>
</nav>

<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-lg-9">
      <div class="card p-4 p-md-5 cart-card">
        <h2 class="mb-4">Shopping Cart</h2>
        
        <div id="cart-items" class="mb-4">
          <!-- Cart items will be loaded here by JavaScript -->
        </div>

        <div class="cart-total-section d-flex flex-column flex-md-row justify-content-between align-items-center shadow">
          <h4 class="mb-3 mb-md-0">Total: $<span id="cart-total">0.00</span></h4>
          <button class="btn btn-success btn-lg px-5 shadow-sm" onclick="checkout()">Proceed to Checkout</button>
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="footer">
  &copy; 2026 smart mart. All Rights Reserved.
</footer>

<script src="script.js"></script>
</body>
</html>
