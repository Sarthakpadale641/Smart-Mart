<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - smart mart</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">

<div class="container-fluid d-flex justify-content-center align-items-center">
  <div class="card p-4 shadow-lg" style="width: 100%; max-width: 450px;">

    <h3 class="text-center mb-2">smart mart</h3>
    <h5 class="text-center mb-4 text-muted">Create an Account</h5>

    <form onsubmit="return registerUser()">

      <div class="mb-4">
        <label class="form-label fw-bold text-secondary small">Full Name</label>
        <input type="text" id="name" class="form-control form-control-lg" placeholder="John Doe" required>
      </div>

      <div class="mb-4">
        <label class="form-label fw-bold text-secondary small">Email Address</label>
        <input type="email" id="email" class="form-control form-control-lg" placeholder="name@example.com" required>
      </div>

      <div class="mb-4">
        <label class="form-label fw-bold text-secondary small">Password</label>
        <input type="password" id="password" class="form-control form-control-lg" placeholder="Create a strong password" required>
      </div>

      <button class="btn btn-success w-100 btn-lg mb-3">Sign Up</button>

    </form>

    <div class="text-center border-top pt-3 mt-2">
      <span class="text-muted small">Already have an account?</span> <a href="login.html" class="text-decoration-none fw-bold">Sign In</a>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
