<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - smart mart</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow" style="width: 400px;">

    <h3 class="text-center mb-4">smart mart</h3>
    <h5 class="text-center mb-3">Reset Password</h5>

    <form onsubmit="return resetPassword()">

      <div class="mb-3">
        <input type="email" id="resetEmail" class="form-control" placeholder="Enter registered email" required>
      </div>

      <button class="btn btn-warning w-100">Send Reset Link</button>

    </form>

    <div class="text-center mt-3">
      <a href="login.html">Back to Login</a>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
