<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - smart mart</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">

<div class="container-fluid d-flex justify-content-center align-items-center">
  <div class="card p-4 shadow-lg" style="width: 100%; max-width: 400px;">

    <h3 class="text-center mb-2">smart mart</h3>
    <h5 class="text-center mb-4 text-muted">Welcome Back</h5>

    <form onsubmit="return loginUser()">

      <div class="mb-4">
        <label class="form-label fw-bold text-secondary small">Email Address</label>
        <input type="email" id="loginEmail" class="form-control form-control-lg" placeholder="Enter your email" required>
      </div>

      <div class="mb-4">
        <label class="form-label fw-bold text-secondary small">Password</label>
        <input type="password" id="loginPassword" class="form-control form-control-lg" placeholder="Enter your password" required>
      </div>

      <button class="btn btn-primary w-100 btn-lg mb-3">Sign In</button>

    </form>

    <div class="text-center border-top pt-3 mt-2">
      <a href="forgot.html" class="text-decoration-none small text-muted hover-primary">Forgot Password?</a><br>
      <span class="text-muted small">New to smart mart?</span> <a href="register.html" class="text-decoration-none fw-bold">Create an account</a>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
